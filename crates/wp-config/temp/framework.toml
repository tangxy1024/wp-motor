[defaults]
[defaults.expect]
basis = "group_input"
min_samples = 100
mode = "warn"

[default]
name = "default"

[[default.sinks]]
name = "default_sink"
fmt = "proto-text"
target = "file"
path = "./out/default.dat"

[miss]
name = "miss"

[[miss.sinks]]
name = "miss_sink"
fmt = "raw"
target = "file"
path = "./out/miss.dat"

[residue]
name = "residue"

[[residue.sinks]]
name = "residue_sink"
fmt = "raw"
target = "file"
path = "./out/residue.dat"

[monitor]
name = "monitor"

[[monitor.sinks]]
name = "monitor_sink"
fmt = "proto-text"
target = "file"
path = "./out/monitor.dat"

[error]
name = "error"

[[error.sinks]]
name = "err_sink"
fmt = "raw"
target = "file"
path = "./out/error.dat"
